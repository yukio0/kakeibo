spring:
  application:
    name: kakeibo
  config:
    import: optional:file:.env[.properties]
  servlet:
    multipart:
      # CSVインポートの上限。家計簿CSVは十分小さいので控えめに固定する。
      max-file-size: 2MB
      max-request-size: 2MB
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      connection-timeout: 5000
      initialization-fail-timeout: 5000
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  # リバースプロキシの X-Forwarded-* を信頼してクライアントIPを復元する。
  # レート制限のIPキーを正しくするために必要。プロキシ自身は信頼できる前提。
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        http-only: true
        same-site: strict
        secure: "${SESSION_COOKIE_SECURE:false}"

kakeibo:
  security:
    authentication-enabled: "${KAKEIBO_AUTHENTICATION_ENABLED:true}"
    two-factor-enabled: "${KAKEIBO_TWO_FACTOR_ENABLED:true}"
  initial-user:
    username: "${KAKEIBO_INITIAL_USERNAME:}"
    password: "${KAKEIBO_INITIAL_PASSWORD:}"
