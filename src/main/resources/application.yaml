spring:
  application:
    name: kakeibo
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      connection-timeout: 5000
      initialization-fail-timeout: 5000
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  servlet:
    session:
      cookie:
        http-only: true
        same-site: strict
        secure: ${SESSION_COOKIE_SECURE:false}

kakeibo:
  initial-user:
    username: ${KAKEIBO_INITIAL_USERNAME:}
    password: ${KAKEIBO_INITIAL_PASSWORD:}
