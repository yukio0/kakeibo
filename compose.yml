services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:?Set DB_NAME in .env}
      POSTGRES_USER: ${DB_USER:?Set DB_USER in .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_PORT: ${APP_PORT:-8080}
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:${APP_PORT:-8080}"
    environment:
      SERVER_PORT: ${APP_PORT:-8080}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:?Set DB_NAME in .env}
      DB_USER: ${DB_USER:?Set DB_USER in .env}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      KAKEIBO_AUTHENTICATION_ENABLED: ${KAKEIBO_AUTHENTICATION_ENABLED:-true}
      KAKEIBO_TWO_FACTOR_ENABLED: ${KAKEIBO_TWO_FACTOR_ENABLED:-true}
      KAKEIBO_INITIAL_USERNAME: ${KAKEIBO_INITIAL_USERNAME:-}
      KAKEIBO_INITIAL_PASSWORD: ${KAKEIBO_INITIAL_PASSWORD:-}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
